<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#151515">
  <meta name="description" content="Darts op TV: kalender, kanalen, streams en speeldagschema's.">
  <title>Darts op TV</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <style>
    :root {
      --bg: #f3f1eb;
      --bg-accent: linear-gradient(180deg, #f8f6f0 0%, #ece9df 100%);
      --surface: #ffffff;
      --surface-soft: #f7f5ef;
      --header: #151515;
      --header-strip: #242321;
      --text: #181817;
      --muted: #6f6a61;
      --line: #ddd8cc;
      --accent: #d9291c;
      --accent-strong: #008f8a;
      --accent-soft: #fbe3dd;
      --gold: #d7a63b;
      --chip-bg: rgba(255,255,255,.10);
      --chip-line: rgba(255,255,255,.18);
      --shadow: 0 12px 26px rgba(28, 26, 21, 0.11);
      --radius: 8px;
      --header-height: 108px;
      --date-strip-height: 48px;
    }
    :root[data-theme="dark"] {
      --bg: #0f0f0e;
      --bg-accent: linear-gradient(180deg, #171715 0%, #0f0f0e 100%);
      --surface: #1b1b19;
      --surface-soft: #24231f;
      --header: #101010;
      --header-strip: #1f1f1d;
      --text: #f1eee6;
      --muted: #aaa59a;
      --line: #36332d;
      --accent: #ff4938;
      --accent-strong: #27c9bd;
      --accent-soft: rgba(255, 73, 56, 0.14);
      --gold: #f2c15d;
      --chip-bg: rgba(255,255,255,.10);
      --chip-line: rgba(255,255,255,.12);
      --shadow: 0 14px 32px rgba(0, 0, 0, 0.30);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      background-image: var(--bg-accent);
      color: var(--text);
    }
    button { font: inherit; }
    .app { max-width: 920px; margin: 0 auto; min-height: 100vh; }
    .header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: linear-gradient(135deg, var(--header), #262522);
      color: #fff;
      box-shadow: 0 2px 14px rgba(0,0,0,.14);
      border-bottom: 2px solid var(--accent);
    }
    .header-main {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 13px 16px 11px;
    }
    .brand { min-width: 0; }
    .title {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      font-size: 1.16rem;
      font-weight: 880;
      letter-spacing: 0;
    }
    .title::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 3px rgba(217, 41, 28, .18);
    }
    .tagline {
      margin-top: 3px;
      color: rgba(255,255,255,.68);
      font-size: .78rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .utility-btn {
      flex: 0 0 auto;
      border: 0;
      background: rgba(255,255,255,.08);
      color: #fff;
      border-radius: 10px;
      width: 38px;
      height: 38px;
      padding: 0;
      min-height: 38px;
      font-weight: 700;
      cursor: pointer;
      line-height: 1;
      font-size: 1.05rem;
    }
    .utility-btn:hover { background: rgba(255,255,255,.16); }
    .utility-btn.active {
      background: var(--accent);
      color: #fff;
    }
    .date-strip {
      position: sticky;
      top: 52px;
      z-index: 40;
      background: var(--header-strip);
      padding: 9px 0;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      border-bottom: 0;
    }
    .date-strip::-webkit-scrollbar { display: none; }
    .date-tabs {
      display: flex;
      gap: 6px;
      padding: 0 16px;
      min-width: max-content;
    }
    .date-tab {
      flex: 0 0 auto;
      border: none;
      background: transparent;
      color: rgba(255,255,255,.66);
      border-radius: 999px;
      padding: 8px 16px;
      cursor: pointer;
      min-height: 34px;
      font-weight: 600;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .date-tab.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 5px 14px rgba(217, 41, 28, .24);
    }
    .content { padding: 16px 16px 28px; }
    .meta { color: var(--muted); font-size: .86rem; }
    .tv-panel {
      display: grid;
      gap: 14px;
      align-items: center;
      margin-bottom: 16px;
      padding: 14px;
      border-radius: 12px;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--surface) 92%, var(--accent) 8%), var(--surface));
      box-shadow: var(--shadow);
    }
    .tv-kicker {
      color: var(--accent);
      font-size: .72rem;
      font-weight: 850;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .tv-title {
      margin-top: 4px;
      font-size: 1rem;
      font-weight: 850;
    }
    .tv-copy {
      margin-top: 4px;
      color: var(--muted);
      font-size: .84rem;
    }
    .tv-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }
    .live-badge,
    .session-channel,
    .round-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }
    .live-badge {
      min-width: 58px;
      min-height: 34px;
      border-radius: 10px;
      background: var(--header);
      color: #fff;
      font-size: .76rem;
      font-weight: 900;
      letter-spacing: .04em;
      box-shadow: inset 0 -2px 0 var(--accent);
    }
    .tv-days {
      display: grid;
      gap: 12px;
    }
    .tv-day {
      display: grid;
      gap: 8px;
    }
    .tv-day-title {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: baseline;
      font-weight: 850;
    }
    .tv-day-date {
      color: var(--muted);
      font-size: .8rem;
      font-weight: 650;
    }
    .session-list {
      display: grid;
      gap: 7px;
    }
    .session-card {
      display: grid;
      grid-template-columns: 62px 1fr auto;
      gap: 10px;
      align-items: start;
      padding: 10px 11px;
      border-radius: 10px;
      background: var(--surface);
      box-shadow: 0 2px 10px rgba(28, 26, 21, 0.06);
    }
    .session-time {
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      font-weight: 900;
    }
    .session-title {
      font-size: .93rem;
      font-weight: 820;
    }
    .session-match {
      margin-top: 4px;
      color: var(--muted);
      font-size: .84rem;
      line-height: 1.35;
    }
    .session-channel {
      border-radius: 999px;
      padding: 5px 8px;
      background: var(--header-strip);
      color: #fff;
      font-size: .72rem;
      font-weight: 850;
    }
    .round-chip {
      width: max-content;
      margin-top: 5px;
      border-radius: 999px;
      padding: 3px 7px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: .7rem;
      font-weight: 850;
    }
    .day-list { display: grid; gap: 26px; margin-top: 12px; }
    .day-section {
      padding: 0 0 8px;
      scroll-margin-top: calc(var(--header-height) + var(--date-strip-height) + 16px);
    }
    .day-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      padding-bottom: 0;
    }
    .day-title { font-size: 1.08rem; font-weight: 850; }
    .competition-list { display: grid; gap: 18px; }
    .competition-block { overflow: visible; }
    .competition-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 0 0 6px;
      background: transparent;
    }
    .competition-name { font-size: .92rem; font-weight: 850; text-transform: uppercase; }
    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: color-mix(in srgb, var(--accent-strong) 11%, transparent);
      color: var(--accent-strong);
      border: 0;
      padding: 4px 8px;
      font-size: .72rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .event-list { display: grid; gap: 6px; }
    .event-row {
      margin: 0;
      overflow: hidden;
      cursor: pointer;
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: 0 2px 12px rgba(45, 39, 29, 0.06);
      border-left: 3px solid transparent;
      transition: background .15s ease;
    }
    .event-row.open {
      background: var(--surface-soft);
      border-left-color: var(--accent);
    }
    .event-main {
      display: grid;
      grid-template-columns: 66px 1fr auto auto;
      gap: 12px;
      align-items: center;
      padding: 12px 14px;
    }
    .time {
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      font-weight: 850;
    }
    .event-title { font-weight: 780; }
    .event-sub { margin-top: 4px; color: var(--muted); font-size: .86rem; }
    .channel-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 74px;
      max-width: 128px;
      padding: 6px 9px;
      border-radius: 999px;
      background: var(--header-strip);
      color: #fff;
      font-size: .74rem;
      font-weight: 850;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .expand { color: var(--muted); font-size: 1rem; line-height: 1; }
    .event-details {
      display: none;
      margin: -2px 0 8px;
      padding: 4px 14px 14px 80px;
      background: var(--surface-soft);
      border-radius: 0 0 var(--radius) var(--radius);
    }
    .event-details.open { display: block; }
    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px 18px;
      margin-bottom: 12px;
    }
    .info-card {
      border: 0;
      border-radius: 0;
      background: transparent;
      padding: 0;
    }
    .info-label { color: var(--muted); font-size: .76rem; text-transform: uppercase; letter-spacing: .04em; }
    .info-value { margin-top: 6px; font-size: .92rem; font-weight: 600; }
    .match-list { display: grid; gap: 8px; }
    .match-item {
      display: grid;
      grid-template-columns: 62px 1fr;
      gap: 10px;
      align-items: start;
      padding-top: 8px;
      border-top: 0;
    }
    .match-item:first-child { padding-top: 0; border-top: 0; }
    .match-time {
      color: var(--accent-strong);
      font-variant-numeric: tabular-nums;
      font-weight: 850;
    }
    .match-text { font-size: .94rem; }
    .match-note { margin-top: 4px; color: var(--muted); font-size: .82rem; }
    .empty-state {
      padding: 18px;
      text-align: center;
      color: var(--muted);
      background: transparent;
      border: 0;
      border-radius: 0;
    }
    @media (max-width: 720px) {
      .header-main {
        padding-top: 14px;
        padding-bottom: 6px;
      }
      .content {
        padding: 12px;
      }
      .date-strip {
        top: 54px;
      }
      .utility-btn { width: 40px; height: 40px; min-height: 40px; }
      .date-tab { min-height: 40px; }
      .event-row { margin: 0; }
      .tv-panel {
        grid-template-columns: 1fr;
        gap: 10px;
      }
      .tv-head {
        align-items: start;
      }
      .live-badge {
        justify-self: start;
      }
      .session-card {
        grid-template-columns: 54px 1fr;
      }
      .session-channel {
        grid-column: 2 / 3;
        justify-self: start;
      }
      .event-main {
        grid-template-columns: 58px 1fr auto;
        align-items: start;
      }
      .channel-pill {
        grid-column: 2 / 3;
        justify-self: start;
        margin-top: -4px;
      }
      .event-details { padding-left: 72px; }
      .info-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-main">
        <div class="brand">
          <div class="title">Darts op TV</div>
          <div class="tagline">Speelschema, zenders en live streams</div>
        </div>
        <div class="header-actions">
          <button id="refresh-btn" class="utility-btn" type="button" aria-label="Ververs data" title="Ververs data">↻</button>
          <button id="theme-toggle" class="utility-btn" type="button" aria-label="Wissel thema" title="Wissel thema">◐</button>
        </div>
      </div>
    </header>

    <div class="date-strip">
      <div id="date-tabs" class="date-tabs"></div>
    </div>

    <main class="content">
      <section id="tv-guide" class="tv-panel" aria-label="TV gids">
        <div class="tv-head">
          <div>
            <div class="tv-kicker">Order of play</div>
            <div class="tv-title">Vandaag, morgen en eerstvolgende sessies</div>
            <div class="tv-copy">Ververs op speeldagen voor de nieuwste beschikbare stream-, board- en partijinformatie.</div>
          </div>
          <div class="live-badge">LIVE</div>
        </div>
        <div id="tv-guide-days" class="tv-days"></div>
      </section>
      <div id="calendar-meta" class="meta"></div>
      <div id="day-list" class="day-list"></div>
    </main>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
