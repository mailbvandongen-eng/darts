<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#173f2b">
  <meta name="description" content="PDC Darts: kalender per datum, schema's, spelers en toernooi-info.">
  <title>Darts</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <style>
    :root {
      --bg: #f6f4ef;
      --bg-accent:
        radial-gradient(circle at top left, rgba(23, 63, 43, 0.13), transparent 34%),
        radial-gradient(circle at top right, rgba(226, 61, 40, 0.12), transparent 30%);
      --surface: #ffffff;
      --surface-soft: #f0eee7;
      --header: #173f2b;
      --header-strip: #b92f24;
      --text: #181713;
      --muted: #716d63;
      --line: #ded9ce;
      --accent: #e23d28;
      --accent-strong: #173f2b;
      --accent-soft: #fde7df;
      --chip-bg: rgba(255,255,255,.14);
      --chip-line: rgba(255,255,255,.2);
      --shadow: 0 10px 24px rgba(45, 39, 29, 0.10);
      --radius: 8px;
      --header-height: 108px;
      --date-strip-height: 48px;
    }
    :root[data-theme="dark"] {
      --bg: #11100d;
      --bg-accent:
        radial-gradient(circle at top left, rgba(44, 121, 80, 0.20), transparent 34%),
        radial-gradient(circle at top right, rgba(226, 61, 40, 0.18), transparent 31%);
      --surface: #1c1b17;
      --surface-soft: #26231d;
      --header: #153826;
      --header-strip: #8f261e;
      --text: #f3efe5;
      --muted: #b0a99a;
      --line: #393429;
      --accent: #ff5a3d;
      --accent-strong: #3bb273;
      --accent-soft: rgba(255, 90, 61, 0.14);
      --chip-bg: rgba(255,255,255,.10);
      --chip-line: rgba(255,255,255,.12);
      --shadow: 0 14px 32px rgba(0, 0, 0, 0.30);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      background-image: var(--bg-accent);
      background-attachment: fixed;
      color: var(--text);
    }
    button { font: inherit; }
    .app { max-width: 920px; margin: 0 auto; min-height: 100vh; }
    .header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--header);
      color: #fff;
      box-shadow: 0 2px 14px rgba(0,0,0,.14);
    }
    .header-main {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
    }
    .title { font-size: 1rem; font-weight: 750; letter-spacing: 0; }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .utility-btn {
      flex: 0 0 auto;
      border: 0;
      background: var(--chip-bg);
      color: #fff;
      border-radius: 50%;
      width: 38px;
      height: 38px;
      padding: 0;
      min-height: 38px;
      font-weight: 700;
      cursor: pointer;
      line-height: 1;
      font-size: 1.05rem;
    }
    .utility-btn:hover { background: rgba(255,255,255,.20); }
    .utility-btn.active {
      background: var(--accent);
      color: #fff;
    }
    .date-strip {
      position: sticky;
      top: 52px;
      z-index: 40;
      background: var(--header-strip);
      padding: 8px 0;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      border-bottom: 0;
    }
    .date-strip::-webkit-scrollbar { display: none; }
    .date-tabs {
      display: flex;
      gap: 4px;
      padding: 0 16px;
      min-width: max-content;
    }
    .date-tab {
      flex: 0 0 auto;
      border: none;
      background: transparent;
      color: rgba(255,255,255,.72);
      border-radius: 4px;
      padding: 8px 16px;
      cursor: pointer;
      min-height: 34px;
      font-weight: 600;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .date-tab.active {
      background: #fffaf0;
      color: var(--header);
    }
    .content { padding: 18px 16px 28px; }
    .meta { color: var(--muted); font-size: .86rem; }
    .day-list { display: grid; gap: 26px; margin-top: 12px; }
    .day-section {
      padding: 0 0 8px;
      scroll-margin-top: calc(var(--header-height) + var(--date-strip-height) + 16px);
    }
    .day-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      padding-bottom: 0;
    }
    .day-title { font-size: 1.05rem; font-weight: 800; }
    .competition-list { display: grid; gap: 18px; }
    .competition-block { overflow: visible; }
    .competition-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 0 0 6px;
      background: transparent;
    }
    .competition-name { font-size: .92rem; font-weight: 800; text-transform: uppercase; }
    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: transparent;
      color: var(--accent);
      border: 0;
      padding: 0;
      font-size: .72rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .event-list { display: grid; gap: 6px; }
    .event-row {
      margin: 0;
      overflow: hidden;
      cursor: pointer;
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: 0 2px 12px rgba(45, 39, 29, 0.06);
      transition: background .15s ease;
    }
    .event-row.open { background: var(--surface-soft); }
    .event-main {
      display: grid;
      grid-template-columns: 66px 1fr auto;
      gap: 12px;
      align-items: start;
      padding: 12px 14px;
    }
    .time { color: var(--accent); font-weight: 800; }
    .event-title { font-weight: 700; }
    .event-sub { margin-top: 4px; color: var(--muted); font-size: .86rem; }
    .expand { color: var(--muted); font-size: 1rem; line-height: 1; }
    .event-details {
      display: none;
      margin: -2px 0 8px;
      padding: 4px 14px 14px 80px;
      background: var(--surface-soft);
      border-radius: 0 0 var(--radius) var(--radius);
    }
    .event-details.open { display: block; }
    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px 18px;
      margin-bottom: 12px;
    }
    .info-card {
      border: 0;
      border-radius: 0;
      background: transparent;
      padding: 0;
    }
    .info-label { color: var(--muted); font-size: .76rem; text-transform: uppercase; letter-spacing: .04em; }
    .info-value { margin-top: 6px; font-size: .92rem; font-weight: 600; }
    .match-list { display: grid; gap: 8px; }
    .match-item {
      display: grid;
      grid-template-columns: 62px 1fr;
      gap: 10px;
      align-items: start;
      padding-top: 8px;
      border-top: 0;
    }
    .match-item:first-child { padding-top: 0; border-top: 0; }
    .match-time { color: var(--accent-strong); font-weight: 800; }
    .match-text { font-size: .94rem; }
    .match-note { margin-top: 4px; color: var(--muted); font-size: .82rem; }
    .empty-state {
      padding: 18px;
      text-align: center;
      color: var(--muted);
      background: transparent;
      border: 0;
      border-radius: 0;
    }
    @media (max-width: 720px) {
      .header-main {
        padding-top: 14px;
        padding-bottom: 6px;
      }
      .content {
        padding: 12px;
      }
      .date-strip {
        top: 54px;
      }
      .utility-btn { width: 40px; height: 40px; min-height: 40px; }
      .date-tab { min-height: 40px; }
      .event-row { margin: 0; }
      .event-main { grid-template-columns: 58px 1fr auto; }
      .event-details { padding-left: 72px; }
      .info-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-main">
        <div class="title">Darts</div>
        <div class="header-actions">
          <button id="refresh-btn" class="utility-btn" type="button" aria-label="Ververs data" title="Ververs data">↻</button>
          <button id="theme-toggle" class="utility-btn" type="button" aria-label="Wissel thema" title="Wissel thema">◐</button>
        </div>
      </div>
    </header>

    <div class="date-strip">
      <div id="date-tabs" class="date-tabs"></div>
    </div>

    <main class="content">
      <div id="calendar-meta" class="meta"></div>
      <div id="day-list" class="day-list"></div>
    </main>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
