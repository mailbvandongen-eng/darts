<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#111827">
  <meta name="description" content="PDC Darts: kalender per datum, schema's, spelers en toernooi-info.">
  <title>PDC Darts</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <style>
    :root {
      --bg: #f3f4f6;
      --bg-accent: radial-gradient(circle at top, rgba(251, 146, 60, 0.12), transparent 38%);
      --surface: #ffffff;
      --surface-soft: #f9fafb;
      --header: #111827;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #ea580c;
      --accent-soft: #fff7ed;
      --chip-bg: rgba(255,255,255,.08);
      --chip-line: rgba(255,255,255,.16);
      --input-bg: rgba(255,255,255,.12);
      --input-text: #ffffff;
      --input-placeholder: rgba(255,255,255,.64);
      --shadow: 0 8px 24px rgba(17, 24, 39, 0.08);
      --radius: 8px;
      --header-height: 122px;
      --date-strip-height: 52px;
    }
    :root[data-theme="dark"] {
      --bg: #0b1120;
      --bg-accent: radial-gradient(circle at top, rgba(234, 88, 12, 0.18), transparent 36%);
      --surface: #101827;
      --surface-soft: #162033;
      --header: #050b16;
      --text: #eff3f8;
      --muted: #93a2b8;
      --line: #243146;
      --accent: #f97316;
      --accent-soft: rgba(249, 115, 22, 0.12);
      --chip-bg: rgba(255,255,255,.05);
      --chip-line: rgba(255,255,255,.1);
      --input-bg: rgba(255,255,255,.08);
      --input-text: #eff3f8;
      --input-placeholder: rgba(239,243,248,.58);
      --shadow: 0 12px 28px rgba(0, 0, 0, 0.28);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      background-image: var(--bg-accent);
      background-attachment: fixed;
      color: var(--text);
    }
    button, input { font: inherit; }
    .app { max-width: 920px; margin: 0 auto; min-height: 100vh; }
    .header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--header);
      color: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,.12);
    }
    .header-main {
      padding: 12px 16px 10px;
    }
    .title { font-size: 1.15rem; font-weight: 700; }
    .subtitle { margin-top: 4px; color: rgba(255,255,255,.72); font-size: .84rem; }
    .toolbar {
      padding: 0 16px 12px;
      display: grid;
      gap: 10px;
    }
    .toolbar-actions {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }
    .toolbar-actions::-webkit-scrollbar { display: none; }
    .utility-btn {
      flex: 0 0 auto;
      border: 1px solid var(--chip-line);
      background: var(--chip-bg);
      color: #fff;
      border-radius: 999px;
      padding: 9px 12px;
      min-height: 38px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    .utility-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .search {
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 13px 14px;
      min-height: 46px;
      background: var(--input-bg);
      color: var(--input-text);
    }
    .search::placeholder { color: var(--input-placeholder); }
    .series-row,
    .date-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }
    .series-row::-webkit-scrollbar,
    .date-tabs::-webkit-scrollbar { display: none; }
    .chip,
    .date-tab {
      flex: 0 0 auto;
      border: 1px solid var(--chip-line);
      background: var(--chip-bg);
      color: rgba(255,255,255,.86);
      border-radius: 999px;
      padding: 8px 12px;
      cursor: pointer;
      min-height: 36px;
      font-weight: 700;
      white-space: nowrap;
    }
    .chip.active,
    .date-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .date-strip {
      position: sticky;
      top: var(--header-height);
      z-index: 40;
      background: color-mix(in srgb, var(--bg) 92%, transparent);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
      padding: 10px 16px;
    }
    .content { padding: 16px; }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }
    .summary-card,
    .day-section,
    .competition-block,
    .event-row,
    .event-details,
    .standings-wrap {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .summary-card {
      padding: 14px;
      min-height: 112px;
    }
    .summary-card.highlight {
      background: linear-gradient(135deg, #fff7ed, #ffffff);
      border-color: #fdba74;
    }
    .summary-label {
      color: var(--muted);
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .summary-value {
      margin-top: 8px;
      font-size: 1.35rem;
      font-weight: 800;
    }
    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 18px 0 10px;
    }
    .section-head h2 {
      margin: 0;
      font-size: 1rem;
    }
    .section-head .meta {
      min-width: 0;
      max-width: 58%;
      margin-left: auto;
      overflow: hidden;
      text-align: right;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .meta { color: var(--muted); font-size: .86rem; }
    .day-list { display: grid; gap: 14px; }
    .day-section {
      padding: 14px;
      scroll-margin-top: calc(var(--header-height) + var(--date-strip-height) + 16px);
    }
    .day-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line);
    }
    .day-title { font-size: 1rem; font-weight: 700; }
    .competition-list { display: grid; gap: 10px; }
    .competition-block { overflow: hidden; }
    .competition-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: var(--surface-soft);
      border-bottom: 1px solid var(--line);
    }
    .competition-name { font-size: .92rem; font-weight: 800; text-transform: uppercase; }
    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      border: 1px solid color-mix(in srgb, var(--accent) 28%, var(--line));
      padding: 5px 9px;
      font-size: .72rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .event-list { display: grid; }
    .event-row {
      margin: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color .15s ease;
    }
    .event-row.open { border-color: #fdba74; }
    .event-main {
      display: grid;
      grid-template-columns: 66px 1fr auto;
      gap: 12px;
      align-items: start;
      padding: 14px;
    }
    .time { color: var(--accent); font-weight: 800; }
    .event-title { font-weight: 700; }
    .event-sub { margin-top: 4px; color: var(--muted); font-size: .86rem; }
    .expand { color: var(--muted); font-size: .9rem; }
    .event-details {
      display: none;
      margin: 0 10px 10px;
      padding: 12px 14px;
      background: #fcfcfd;
    }
    .event-details.open { display: block; }
    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }
    .info-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 10px 12px;
    }
    .info-label { color: var(--muted); font-size: .76rem; text-transform: uppercase; letter-spacing: .04em; }
    .info-value { margin-top: 6px; font-size: .92rem; font-weight: 600; }
    .match-list { display: grid; gap: 8px; }
    .match-item {
      display: grid;
      grid-template-columns: 62px 1fr;
      gap: 10px;
      align-items: start;
      padding-top: 8px;
      border-top: 1px solid var(--line);
    }
    .match-item:first-child { padding-top: 0; border-top: 0; }
    .match-time { color: #c2410c; font-weight: 800; }
    .match-text { font-size: .94rem; }
    .match-note { margin-top: 4px; color: var(--muted); font-size: .82rem; }
    .empty-state {
      padding: 18px;
      text-align: center;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }
    .watchlist {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
    }
    .watch-card {
      display: grid;
      gap: 10px;
      padding: 14px;
      background: linear-gradient(135deg, #fff7ed, #ffffff);
      border: 1px solid #fdba74;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .watch-head,
    .watch-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .watch-title {
      font-weight: 800;
    }
    .watch-meta {
      color: var(--muted);
      font-size: .88rem;
    }
    .button-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .action-btn {
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 12px;
      min-height: 36px;
      cursor: pointer;
      font-weight: 700;
    }
    .action-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .standings-wrap { overflow-x: auto; }
    table {
      width: 100%;
      min-width: 620px;
      border-collapse: collapse;
    }
    th, td {
      padding: 11px 10px;
      text-align: left;
      border-bottom: 1px solid var(--line);
      font-size: .9rem;
    }
    th {
      background: var(--accent-soft);
      color: #c2410c;
      text-transform: uppercase;
      letter-spacing: .04em;
      font-size: .76rem;
    }
    @media (max-width: 720px) {
      .summary-grid { grid-template-columns: 1fr; }
      .header-main {
        padding-top: 14px;
        padding-bottom: 8px;
      }
      .toolbar {
        padding-left: 12px;
        padding-right: 12px;
      }
      .content {
        padding: 12px;
      }
      .date-strip {
        padding-left: 12px;
        padding-right: 12px;
      }
      .section-head {
        display: grid;
        gap: 4px;
        justify-content: stretch;
      }
      .section-head .meta {
        max-width: 100%;
        margin-left: 0;
        text-align: left;
      }
      .utility-btn,
      .chip,
      .date-tab {
        min-height: 40px;
      }
      .event-row {
        margin: 8px;
      }
      .event-main { grid-template-columns: 58px 1fr auto; }
      .info-grid { grid-template-columns: 1fr; }
      .button-row {
        display: grid;
        grid-template-columns: 1fr;
      }
      .action-btn {
        width: 100%;
      }
      .watch-actions {
        align-items: stretch;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-main">
        <div class="title">PDC Darts</div>
        <div class="subtitle">3 dagen terug, 3 weken vooruit</div>
      </div>
      <div class="toolbar">
        <div class="toolbar-actions">
          <button id="today-btn" class="utility-btn" type="button">Vandaag</button>
          <button id="saved-filter-btn" class="utility-btn" type="button">Alle sessies</button>
          <button id="theme-toggle" class="utility-btn" type="button">Donker thema</button>
        </div>
        <input id="search-input" class="search" type="search" placeholder="Zoek speler, partij, toernooi of locatie">
        <div id="series-row" class="series-row"></div>
      </div>
    </header>

    <div class="date-strip">
      <div id="date-tabs" class="date-tabs"></div>
    </div>

    <main class="content">
      <section class="summary-grid" id="summary-grid"></section>

      <section>
        <div class="section-head">
          <h2>Kijkplan</h2>
          <div id="watchlist-meta" class="meta"></div>
        </div>
        <div id="watchlist" class="watchlist"></div>
      </section>

      <section>
        <div class="section-head">
          <h2>Kalender</h2>
          <div id="calendar-meta" class="meta"></div>
        </div>
        <div id="day-list" class="day-list"></div>
      </section>

      <section>
        <div class="section-head">
          <h2>Premier League Stand</h2>
          <div class="meta">Snapshot</div>
        </div>
        <div class="standings-wrap">
          <table>
            <thead>
              <tr><th>Pos</th><th>Speler</th><th>Gespeeld</th><th>Halve</th><th>Finales</th><th>Winst</th><th>Punten</th></tr>
            </thead>
            <tbody id="standings-body"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
